<!-- Errors Header -->
<div class="p-4 border-b border-base-300 flex items-center justify-between">
    <h2 class="text-lg font-bold">Errors - {{ project_name }}</h2>
</div>

<!-- Filters -->
<div class="p-2 border-b border-base-300 flex items-center gap-2 flex-wrap">
    <select id="host-filter" class="select select-bordered select-xs"
            hx-get="/api/errors/{{ project_slug }}"
            hx-target="#error-entries"
            hx-include="[id='host-filter'], [id='search-filter']"
            name="host_id">
        <option value="">All Hosts</option>
        {% for h in hosts %}
        <option value="{{ h.id }}">{{ h.hostname }}</option>
        {% endfor %}
    </select>

    <input id="search-filter" type="text" placeholder="Search errors..."
           class="input input-bordered input-xs w-64"
           name="search"
           hx-get="/api/errors/{{ project_slug }}"
           hx-target="#error-entries"
           hx-include="[id='host-filter'], [id='search-filter']"
           hx-trigger="keyup changed delay:300ms" />
</div>

<!-- Errors Table -->
<div class="flex-1 overflow-y-auto p-4">
    <div id="error-entries">
        {{ errors_html|safe }}
    </div>
</div>
