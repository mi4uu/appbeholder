<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }}</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.14/dist/full.min.css" rel="stylesheet" type="text/css" />
    <link href="https://cdn.lineicons.com/5.0/lineicons.css" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script src="https://unpkg.com/htmx-ext-sse@2.2.2/sse.js"></script>
</head>
<body class="min-h-screen bg-base-100">
    <div class="flex min-h-screen">
        <!-- Sidebar -->
        <aside class="w-64 bg-base-200 border-r border-base-300 flex flex-col">
            <div class="p-4 border-b border-base-300 flex items-center gap-3">
                <img src="/static/logo.png" alt="App Beholder" class="w-8 h-8" />
                <h1 class="text-lg font-bold">App Beholder</h1>
            </div>

            <!-- Project Selector -->
            <div class="p-4 border-b border-base-300">
                <label class="label text-xs opacity-60">Project</label>
                {% if projects.is_empty() %}
                <p class="text-sm opacity-60">No projects yet</p>
                {% else %}
                <select class="select select-bordered select-sm w-full"
                        onchange="if(this.value) window.location.href='/projects/'+this.value+'/logs'">
                    {% if !has_project %}
                    <option disabled selected>Select project</option>
                    {% endif %}
                    {% for p in projects %}
                    <option value="{{ p.slug }}" {% if p.selected %}selected{% endif %}>
                        {{ p.name }}
                    </option>
                    {% endfor %}
                </select>
                {% endif %}
            </div>

            <!-- Navigation -->
            {% if has_project %}
            <nav class="flex-1 p-2">
                <ul class="menu menu-sm">
                    <li>
                        <a href="/projects/{{ current_slug }}/logs" class="{% if current_page == "logs" %}active{% endif %}">
                            <i class="lni lni-list"></i>
                            Live Logs
                        </a>
                    </li>
                    <li>
                        <a href="/projects/{{ current_slug }}/traces" class="{% if current_page == "traces" %}active{% endif %}">
                            <i class="lni lni-bolt"></i>
                            Traces
                        </a>
                    </li>
                    <li>
                        <a href="/projects/{{ current_slug }}/errors" class="{% if current_page == "errors" %}active{% endif %}">
                            <i class="lni lni-warning"></i>
                            Errors
                        </a>
                    </li>
                    <li>
                        <a href="/projects/{{ current_slug }}/metrics" class="{% if current_page == "metrics" %}active{% endif %}">
                            <i class="lni lni-bar-chart"></i>
                            Metrics
                        </a>
                    </li>
                    <li>
                        <a href="/projects/{{ current_slug }}/hosts" class="{% if current_page == "hosts" %}active{% endif %}">
                            <i class="lni lni-server"></i>
                            Hosts
                        </a>
                    </li>
                </ul>
            </nav>
            {% endif %}

            <!-- Bottom nav -->
            <div class="p-2 border-t border-base-300">
                <ul class="menu menu-sm">
                    <li>
                        <a href="/projects" class="{% if current_page == "projects" %}active{% endif %}">
                            <i class="lni lni-cog"></i>
                            Manage Projects
                        </a>
                    </li>
                </ul>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 flex flex-col">
            {{ content|safe }}
        </main>
    </div>
</body>
</html>
