<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }}</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.14/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script src="https://unpkg.com/htmx-ext-sse@2.2.2/sse.js"></script>
</head>
<body class="min-h-screen bg-base-100">
    <div class="flex min-h-screen">
        <!-- Sidebar -->
        <aside class="w-64 bg-base-200 border-r border-base-300 flex flex-col">
            <div class="p-4 border-b border-base-300">
                <h1 class="text-xl font-bold">App Beholder</h1>
            </div>

            <!-- Project Selector -->
            <div class="p-4 border-b border-base-300">
                <label class="label text-xs opacity-60">Project</label>
                {% if projects.is_empty() %}
                <p class="text-sm opacity-60">No projects yet</p>
                {% else %}
                <select class="select select-bordered select-sm w-full"
                        onchange="if(this.value) window.location.href='/projects/'+this.value+'/logs'">
                    {% if !has_project %}
                    <option disabled selected>Select project</option>
                    {% endif %}
                    {% for p in projects %}
                    <option value="{{ p.slug }}" {% if p.selected %}selected{% endif %}>
                        {{ p.name }}
                    </option>
                    {% endfor %}
                </select>
                {% endif %}
            </div>

            <!-- Navigation -->
            {% if has_project %}
            <nav class="flex-1 p-2">
                <ul class="menu menu-sm">
                    <li>
                        <a href="/projects/{{ current_slug }}/logs" class="active">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" /></svg>
                            Live Logs
                        </a>
                    </li>
                    <li>
                        <a href="/projects/{{ current_slug }}/traces" class="opacity-50">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" /></svg>
                            Traces
                        </a>
                    </li>
                    <li>
                        <a href="/projects/{{ current_slug }}/errors" class="opacity-50">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                            Errors
                        </a>
                    </li>
                    <li>
                        <a href="/projects/{{ current_slug }}/metrics" class="opacity-50">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" /></svg>
                            Metrics
                        </a>
                    </li>
                    <li>
                        <a href="/projects/{{ current_slug }}/hosts" class="opacity-50">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 12h14M5 12a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v4a2 2 0 01-2 2M5 12a2 2 0 00-2 2v4a2 2 0 002 2h14a2 2 0 002-2v-4a2 2 0 00-2-2" /></svg>
                            Hosts
                        </a>
                    </li>
                </ul>
            </nav>
            {% endif %}
        </aside>

        <!-- Main Content -->
        <main class="flex-1 flex flex-col">
            {{ content|safe }}
        </main>
    </div>
</body>
</html>
